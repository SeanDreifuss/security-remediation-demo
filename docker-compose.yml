version: '3.8'

services:
  webhook-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devin-remediation-webhook
    ports:
      - "${WEBHOOK_PORT:-5000}:5000"
    env_file:
      - .env
    volumes:
      - ./webhook.log:/app/webhook.log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s